<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CabDemand AI</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <a href="/" style="display:block;text-align:center;font-size:1.8rem;margin-bottom:8px;text-decoration:none">🚕</a>
    <h2>Welcome Back</h2>
    <div id="alert-box"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label>Login As</label>
        <select id="role">
          <option value="user">👤 User</option>
          <option value="admin">⚙️ Admin</option>
          <option value="driver">🚗 Driver</option>
        </select>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label style="display:flex;gap:8px;align-items:center;cursor:pointer">
          <input type="checkbox" style="width:auto"/> Remember me
        </label>
        <a href="#" style="color:var(--primary);font-size:0.85rem" onclick="showForgotPassword()">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
    <p style="text-align:center;margin-top:20px;color:var(--muted);font-size:0.9rem">
      Don't have an account? <a href="/pages/signup.html" style="color:var(--primary)">Sign Up</a>
    </p>

    <!-- Forgot Password Modal -->
    <div id="forgot-modal" style="display:none;margin-top:20px;border-top:1px solid #2a2a4a;padding-top:20px">
      <h3 style="color:var(--primary);margin-bottom:12px;font-size:1rem">Reset Password</h3>
      <div id="forgot-alert"></div>
      <div class="form-group">
        <label>Enter your registered Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group" id="new-pass-group" style="display:none">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Min 8 characters" minlength="8"/>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" onclick="handleForgot()">Continue</button>
        <button class="btn btn-outline" style="flex:1" onclick="hideForgotPassword()">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script>
  function showForgotPassword() {
    document.getElementById('forgot-modal').style.display = 'block';
    document.getElementById('forgot-alert').innerHTML = '';
    document.getElementById('new-pass-group').style.display = 'none';
    document.getElementById('forgot-email').value = '';
  }

  function hideForgotPassword() {
    document.getElementById('forgot-modal').style.display = 'none';
  }

  let emailVerified = false;

  async function handleForgot() {
    const email = document.getElementById('forgot-email').value;
    if (!email) {
      document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-danger">Please enter your email.</div>';
      return;
    }
    if (!emailVerified) {
      // Step 1: check if email exists
      try {
        const res = await fetch('/api/auth/check-email', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email})
        });
        const data = await res.json();
        if (res.ok) {
          emailVerified = true;
          document.getElementById('new-pass-group').style.display = 'block';
          document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-success">✅ Email found! Enter your new password.</div>';
        } else {
          document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-danger">❌ Email not registered.</div>';
        }
      } catch {
        document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-danger">Server error.</div>';
      }
    } else {
      // Step 2: reset password
      const newPassword = document.getElementById('new-password').value;
      if (!newPassword || newPassword.length < 8) {
        document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-danger">Password must be at least 8 characters.</div>';
        return;
      }
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, new_password: newPassword})
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-success">✅ Password reset! You can now login.</div>';
          emailVerified = false;
          setTimeout(hideForgotPassword, 2000);
        } else {
          document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-danger">Reset failed. Try again.</div>';
        }
      } catch {
        document.getElementById('forgot-alert').innerHTML = '<div class="alert alert-danger">Server error.</div>';
      }
    }
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password, role})
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('name', data.name);
        localStorage.setItem('user_id', data.user_id);
        if (data.role === 'admin') {
          window.location.href = 'admin.html';
        } else if (data.role === 'driver') {
          window.location.href = 'driver-dashboard.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } else {
        document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
      }
    } catch {
      document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">Server error. Please try again.</div>`;
    }
  });
</script>
</body>
</html>
