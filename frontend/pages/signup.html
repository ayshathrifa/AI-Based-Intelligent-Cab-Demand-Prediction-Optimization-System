<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - CabDemand AI</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <a href="/" style="display:block;text-align:center;font-size:1.8rem;margin-bottom:8px;text-decoration:none">🚕</a>
    <h2>Create Account</h2>
    <div id="alert-box"></div>
    <form id="signup-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 8 characters" required minlength="8"/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="driver">Driver</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:20px;color:var(--muted);font-size:0.9rem">
      Already have an account? <a href="login.html" style="color:var(--primary)">Login</a>
    </p>
  </div>
</div>
<script>
  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      role: document.getElementById('role').value
    };
    try {
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('alert-box').innerHTML = `<div class="alert alert-success">Account created! Redirecting...</div>`;
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
      }
    } catch {
      document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">Server error.</div>`;
    }
  });
</script>
</body>
</html>
